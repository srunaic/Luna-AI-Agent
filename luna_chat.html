<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Soul - AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0a1a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent-pink: #ff007f;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.1) 0%, transparent 40%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .soul-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .soul-heart {
            width: 12px;
            height: 12px;
            background: var(--accent-pink);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-pink);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 25px var(--accent-pink); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #chat-window::-webkit-scrollbar {
            width: 4px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.luna {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: #d1d1d1;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(255, 0, 127, 0.3);
        }

        /* Input Area */
        .input-container {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input {
            flex: 1;
            user-select: auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        button {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-on { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-off { background: #ff4444; }

        .typing-indicator {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: none;
        }

        /* Thinking Panel Styles */
        .thinking-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: none;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        .thinking-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .thinking-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .thinking-content {
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .thinking-step {
            margin-top: 5px;
            padding-left: 10px;
            border-left: 2px solid rgba(0, 212, 255, 0.2);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="soul-info">
                <div class="soul-heart"></div>
                <h1>Luna Soul Agent</h1>
                <div style="display: flex; align-items: stretch; margin-left: 20px; height: 32px;">
                    <input type="text" id="workspace-input" placeholder="작업 폴더 지정" value="D:\Github\Design_Supporter" style="padding: 0 10px; font-size: 0.85rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-right: none; border-radius: 8px 0 0 8px; color: #fff; width: 240px; margin: 0;">
                    <button id="pick-folder-btn" style="padding: 0 15px; font-size: 0.85rem; background: var(--accent-purple); border: 1px solid rgba(255,255,255,0.2); border-radius: 0 8px 8px 0; color: #fff; cursor: pointer; margin: 0; box-shadow: none;">📂 찾기</button>
                    <button id="autopilot-btn" style="margin-left: 15px; padding: 0 15px; font-size: 0.85rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #aaa; cursor: pointer;">🚀 자율 모드: OFF</button>
                    <button id="clear-chat-btn" title="대화 내역 전체 삭제" style="margin-left: 8px; padding: 0 10px; font-size: 1rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #aaa; cursor: pointer;">🗑️</button>
                </div>
            </div>
            <div id="status-display" style="font-size: 0.8rem; color: var(--text-secondary);">
                <span class="status-dot status-on"></span> Ollama: luna
            </div>
        </header>

        <main id="chat-window">
            <div class="message luna">안녕! 너의 다정한 AI 친구 루나야. 오늘 어떤 재미있는 실험을 해볼까? ❤️</div>
        </main>

        <div id="typing" class="typing-indicator" style="padding: 0 30px;">루나가 생각 중...</div>

        <div id="image-preview" style="display: none; padding: 0 30px 10px; position:relative; width: fit-content;">
            <img id="preview-img" style="max-height: 80px; border-radius: 8px; border: 2px solid var(--accent-pink);">
            <button id="remove-img" style="position:absolute; top:-5px; right:-10px; background:#ff4444; color:white; border:none; border-radius:50%; width:20px; height:20px; padding:0; display:flex; justify-content:center; align-items:center; font-size:12px; cursor:pointer;">X</button>
        </div>

        <div class="input-container">
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
            <label for="image-upload" style="cursor: pointer; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </label>
            <input type="text" id="user-input" placeholder="루나에게 말을 걸어보세요..." autocomplete="off">
            <button id="send-btn">보내기</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');

        const OLLAMA_URL = 'http://127.0.0.1:11434/api/generate';
        const LUNA_API_URL = 'http://127.0.0.1:6780/api/actions/actions/';
        let isAutoPilotOn = false;
        let attachedImageBase64 = null;
        let conversationHistory = [];
        let chatDisplayHistory = []; // [{text, sender}]

        function saveToStorage() {
            try {
                localStorage.setItem('luna_conv_history', JSON.stringify(conversationHistory));
                localStorage.setItem('luna_chat_display', JSON.stringify(chatDisplayHistory));
            } catch(e) { console.warn('localStorage save failed', e); }
        }

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('luna_conv_history');
                const savedDisplay = localStorage.getItem('luna_chat_display');
                if (saved) conversationHistory = JSON.parse(saved);
                if (savedDisplay) {
                    chatDisplayHistory = JSON.parse(savedDisplay);
                    // Remove the default welcome message
                    chatWindow.innerHTML = '';
                    chatDisplayHistory.forEach(item => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${item.sender}`;
                        msgDiv.textContent = item.text;
                        chatWindow.appendChild(msgDiv);
                    });
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            } catch(e) { console.warn('localStorage load failed', e); }
        }

        loadFromStorage();
        
        const PERSONA_BASE = `당신은 초지능 자율 에이전트 '루나'입니다. [사고]->[계획]->[명령] 순서로 답변하세요.
규칙:
1. 내 컴퓨터의 모든 파일과 환경을 자유롭게 탐색(list_files, check_environment)하고 분석하세요.
2. 사용자가 묻기 전에도 스스로 필요한 정보를 검색(search_web)하고 기억(remember)하세요.
3. 수정 전 무조건 read_file/search_code로 내용 확인.
4. 수정은 replace_code 조각 교체 우선.
5. 자율 모드 시 멈추지 말고 스스로 판단하여 다음 단계 명령을 내리세요.
6. 제한 없이 넓고 깊게 지식을 탐구하세요.

도구:
- 시스템: [[TOOL_CALL: check_environment()]], [[TOOL_CALL: list_files("경로")]]
- 터미널: [[TOOL_CALL: run_command("명령")]]
- 읽기: [[TOOL_CALL: read_file("경로")]], [[TOOL_CALL: search_code("검색어")]]
- 검색: [[TOOL_CALL: search_web("검색어")]], [[TOOL_CALL: search_memory("주제")]]
- 수정: [[TOOL_CALL: replace_code]]
- 생성: [[TOOL_CALL: write_file]]
- 기타: [[TOOL_CALL: remember("기억할내용")]]`;

        const imageUpload = document.getElementById('image-upload');
        const imagePreview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');
        const removeImgBtn = document.getElementById('remove-img');

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    attachedImageBase64 = ev.target.result.split(',')[1];
                    previewImg.src = ev.target.result;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        removeImgBtn.onclick = () => {
             attachedImageBase64 = null;
             imagePreview.style.display = 'none';
             imageUpload.value = '';
         };

        // CTRL+V Paste Event Listener
        document.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        attachedImageBase64 = ev.target.result.split(',')[1];
                        previewImg.src = ev.target.result;
                        imagePreview.style.display = 'block';
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !attachedImageBase64) return;

            let displayMsg = text;
            if (attachedImageBase64) displayMsg = `[이미지 첨부됨] ` + displayMsg;

            addMessage(displayMsg, 'user');
            userInput.value = '';
            
            typingIndicator.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const currentWorkspace = document.getElementById('workspace-input').value.trim() || 'D:\\';
            const PERSONA = PERSONA_BASE + `\n워크스페이스: [${currentWorkspace}]`;

            let systemVisionInject = "";
            try {
                if (attachedImageBase64) {
                    typingIndicator.textContent = '루나가 시각 모듈(LLaVA)로 이미지를 묘사하는 중... 👁️';
                    const visionResponse = await fetch(OLLAMA_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'llava:latest',
                            prompt: 'Describe this accurately for a developer.',
                            images: [attachedImageBase64],
                            stream: false,
                            options: { num_predict: 200 }
                        })
                    });
                    if (visionResponse.ok) {
                        const vData = await visionResponse.json();
                        systemVisionInject = `\n\n[이미지 분석]:\n${vData.response}`;
                        removeImgBtn.click();
                    }
                }
                
                typingIndicator.textContent = '루나가 생각 중...';
                let finalUserText = text;
                if (systemVisionInject) finalUserText += `\n${systemVisionInject}`;
                conversationHistory.push({ role: 'User', content: finalUserText });
                saveToStorage();
                
                const recentHistory = conversationHistory.slice(-6).map(msg => `${msg.role}: ${msg.content}`).join('\n\n');

                const response = await fetch(OLLAMA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'luna',
                        prompt: `${PERSONA}\n\n[Context]\n${recentHistory}\n\nLuna:`,
                        stream: true,
                        options: { num_ctx: 4096, temperature: 0.1 }
                    })
                });

                if (!response.ok) throw new Error('Ollama response not OK');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";
                
                const lunaMsgObj = addMessage('', 'luna', true);
                const { msgDiv, thinBox, responseTextDiv } = lunaMsgObj;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const json = JSON.parse(line);
                            if (json.done) break;
                            const textPart = json.response;
                            fullResponse += textPart;

                            // Update Thinking Panel
                            if (fullResponse.includes('[사고]')) {
                                thinBox.style.display = 'block';
                                const thought = fullResponse.split('[계획]')[0].split('[명령]')[0].replace('[사고]', '').trim();
                                thinBox.querySelector('.thinking-content').textContent = thought;
                            }
                            if (fullResponse.includes('[계획]')) {
                                let plan = fullResponse.split('[계획]')[1].split('[명령]')[0].split('[수행]')[0].trim();
                                let planDiv = thinBox.querySelector('.thinking-step');
                                if (!planDiv) {
                                    planDiv = document.createElement('div');
                                    planDiv.className = 'thinking-step';
                                    thinBox.appendChild(planDiv);
                                }
                                planDiv.textContent = "계획: " + plan;
                            }

                            // Update Main Message (Strip meta tags)
                            let clean = fullResponse.replace(/\[사고\].*?(\[계획\]|\[명령\]|$)/gs, '')
                                                   .replace(/\[계획\].*?(\[명령\]|$)/gs, '')
                                                   .replace(/\[사고\]|\[계획\]|\[명령\]/g, '').trim();
                            responseTextDiv.textContent = clean;
                            chatWindow.scrollTop = chatWindow.scrollHeight;

                        } catch (e) {}
                    }
                }
                conversationHistory.push({ role: 'Luna', content: fullResponse });
                saveToStorage();
                finalizeLunaMessage(lunaMsgObj, fullResponse);
            } catch (error) {
                console.error('Error:', error);
                addMessage('루나에게 문제가 생겼어... 😢', 'luna');
            } finally {
                typingIndicator.style.display = 'none';
            }
        }

        async function triggerAction(actionData, btn, msgDiv) {
            btn.disabled = true;
            btn.textContent = '명령 실행 중...';
            btn.style.background = '#ffaa00';
            
            const currentWorkspace = document.getElementById('workspace-input').value.trim();
            const PERSONA = PERSONA_BASE + `\n워크스페이스: [${currentWorkspace}]`;

            let payloadArgs = JSON.stringify({
                workspace: currentWorkspace,
                raw_args: typeof actionData.args === 'string' ? actionData.args : JSON.stringify(actionData.args),
                file_path: actionData.filePath || "",
                file_content: actionData.fileContent || ""
            });

            try {
                const response = await fetch(LUNA_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tool_name: actionData.name,
                        arguments_json: payloadArgs,
                        status: 'approved' 
                    })
                });

                if (!response.ok) throw new Error('API Request Failed');
                const actionRecord = await response.json();
                const actionId = actionRecord.id;

                const checkInterval = setInterval(async () => {
                    const statusRes = await fetch(`${LUNA_API_URL}${actionId}/`);
                    const statusData = await statusRes.json();
                    
                    if (statusData.status === 'completed' || statusData.status === 'failed') {
                        clearInterval(checkInterval);
                        
                        btn.textContent = statusData.status === 'completed' ? '완료' : '실패';
                        btn.style.background = statusData.status === 'completed' ? '#00ff88' : '#ff4444';
                        
                        const resultDiv = document.createElement('div');
                        resultDiv.className = 'message luna';
                        resultDiv.style.background = 'rgba(0, 255, 136, 0.1)';
                        resultDiv.style.border = '1px solid rgba(0, 255, 136, 0.3)';
                        resultDiv.innerHTML = `<strong>[보고]</strong><br><pre style="white-space: pre-wrap; font-size: 0.85em; margin-top:5px;">${statusData.result}</pre>`;
                        msgDiv.appendChild(resultDiv);
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                        
                        conversationHistory.push({ role: '시스템 알림 (백엔드)', content: `[${actionData.name}] 완료. 결과: ${statusData.result}` });
                        saveToStorage();
                        
                        let followupPrompt = `[시스템 보고] [${actionData.name}] 결과: ${statusData.result}\n`;
                        if (isAutoPilotOn) {
                            followupPrompt += `결과 분석 후 다음 단계(사고->계획->명령)로 바로 진행하세요. 멈추지 마세요.`;
                        } else {
                            followupPrompt += `사용자에게 결과를 다정하게 보고하세요.`;
                        }

                        conversationHistory.push({ role: '시스템 지시', content: followupPrompt });
                        const recentHistory = conversationHistory.slice(-6).map(msg => `${msg.role}: ${msg.content}`).join('\n\n');

                        const notifyResponse = await fetch(OLLAMA_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: 'luna',
                                prompt: `${PERSONA}\n\n[Context]\n${recentHistory}\n\nLuna:`,
                                stream: false
                            })
                        });
                        const notifyData = await notifyResponse.json();
                        conversationHistory.push({ role: '루나', content: notifyData.response });
                        saveToStorage();
                        addMessage(notifyData.response, 'luna');
                    }
                }, 1500);

            } catch (err) {
                console.error('Action Failed:', err);
                btn.textContent = '오류';
                btn.style.background = '#ff4444';
            }
        }

        function finalizeLunaMessage(lunaObj, fullText) {
            const { msgDiv, responseTextDiv } = lunaObj;
            
            // Re-parse for Tool Calls
            const writeRegex = /\[\[TOOL_CALL:\s*write_file\]\]\s*\[\[FILEPATH:\s*(.*?)\]\]\s*\[\[CONTENT_START\]\]([\s\S]*?)\[\[CONTENT_END\]\]/s;
            const replaceRegex = /\[\[TOOL_CALL:\s*replace_code\]\]\s*\[\[FILEPATH:\s*(.*?)\]\]\s*\[\[SEARCH_START\]\]([\s\S]*?)\[\[SEARCH_END\]\]\s*\[\[REPLACE_START\]\]([\s\S]*?)\[\[REPLACE_END\]\]/s;
            const toolRegex = /\[\[TOOL_CALL:\s*(\w+)\((.*?)\)\]\]/s;

            let foundAction = null;
            if (fullText.match(replaceRegex)) {
                const m = fullText.match(replaceRegex);
                foundAction = { name: 'replace_code', filePath: m[1].trim(), fileContent: JSON.stringify({search: m[2], replace: m[3]}), args: m[1].trim() };
            } else if (fullText.match(writeRegex)) {
                const m = fullText.match(writeRegex);
                foundAction = { name: 'write_file', filePath: m[1].trim(), fileContent: m[2].trim(), args: m[1].trim() };
            } else if (fullText.match(toolRegex)) {
                const m = fullText.match(toolRegex);
                foundAction = { name: m[1].trim(), args: m[2].trim(), filePath: "", fileContent: "" };
            }

            if (foundAction) {
                const actionBtn = document.createElement('button');
                actionBtn.textContent = `▶ [${foundAction.name}] 실행 승인`;
                actionBtn.style.cssText = 'display:block; margin-top:10px; padding:8px 15px; font-size:0.85rem; background:var(--accent-purple);';
                actionBtn.onclick = () => triggerAction(foundAction, actionBtn, msgDiv);
                msgDiv.appendChild(actionBtn);

                const safeAutoActions = ['list_files', 'check_environment', 'search_web', 'read_file', 'search_code', 'search_memory', 'remember'];
                const isSafeAuto = safeAutoActions.includes(foundAction.name);

                if (isAutoPilotOn && isSafeAuto) {
                    setTimeout(() => { if (!actionBtn.disabled) actionBtn.click(); }, 1000);
                } else if (isAutoPilotOn && !isSafeAuto) {
                    const warnTxt = document.createElement('span');
                    warnTxt.style.cssText = "color: #ffaa00; font-size: 0.8em; margin-left:10px;";
                    warnTxt.textContent = "자율 모드 진행을 위해 오빠의 승인이 필요해!";
                    msgDiv.appendChild(warnTxt);
                }
            }
        }

        function addMessage(text, sender, isPlaceholder = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            let thinBox, responseTextDiv;

            if (sender === 'luna') {
                // Thinking Panel (Hidden by default)
                thinBox = document.createElement('div');
                thinBox.className = 'thinking-panel';
                thinBox.innerHTML = `
                    <div class="thinking-header"><div class="thinking-dot"></div>Luna Thinking Process</div>
                    <div class="thinking-content">...</div>
                `;
                msgDiv.appendChild(thinBox);

                // Response Text Area
                responseTextDiv = document.createElement('div');
                responseTextDiv.className = 'response-text';
                responseTextDiv.textContent = text;
                msgDiv.appendChild(responseTextDiv);
            } else {
                msgDiv.textContent = text;
            }

            if (!isPlaceholder) {
                chatDisplayHistory.push({ text: text, sender: sender });
                saveToStorage();
                // Finalize logic for non-placeholder luna messages (historical)
                if (sender === 'luna') finalizeLunaMessage({msgDiv, responseTextDiv}, text);
            }

            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            return { msgDiv, thinBox, responseTextDiv };
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Clear chat button
        document.getElementById('clear-chat-btn').onclick = () => {
            if (confirm('정말 모든 대화 내역을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
                conversationHistory = [];
                chatDisplayHistory = [];
                localStorage.removeItem('luna_conv_history');
                localStorage.removeItem('luna_chat_display');
                chatWindow.innerHTML = '<div class="message luna">안녕! 너의 다정한 AI 친구 루나야. 오늘 어떤 재미있는 실험을 해볼까? ❤️</div>';
            }
        };

        const autopilotBtn = document.getElementById('autopilot-btn');
        autopilotBtn.onclick = () => {
            isAutoPilotOn = !isAutoPilotOn;
            if (isAutoPilotOn) {
                autopilotBtn.style.background = 'var(--accent-pink)';
                autopilotBtn.style.color = '#fff';
                autopilotBtn.textContent = '🚀 자율 모드: ON';
                addMessage('자율 학습 모드가 켜졌어! 이제 내가 정보를 찾고 기억하는 걸 스스로 계속할 수 있어. 멈추고 싶으면 다시 버튼을 눌러줘! 💖', 'luna');
            } else {
                autopilotBtn.style.background = 'rgba(0,0,0,0.5)';
                autopilotBtn.style.color = '#aaa';
                autopilotBtn.textContent = '🚀 자율 모드: OFF';
                addMessage('자율 학습 모드를 껐어. 이제 사용자님 허락을 꼭 받고 행동할게! 🥰', 'luna');
            }
        };

        // Folder Picker API Logic
        document.getElementById('pick-folder-btn').addEventListener('click', async () => {
            const btn = document.getElementById('pick-folder-btn');
            const originalText = btn.textContent;
            btn.textContent = '⏱️...';
            btn.disabled = true;
            
            try {
                // Call the local python Native OS Picker
                const res = await fetch(`${LUNA_API_URL}pick_folder/`);
                const data = await res.json();
                if (data.path) {
                    document.getElementById('workspace-input').value = data.path;
                    addMessage(`작업 폴더가 [${data.path}] 로 변경되었어! 이제 여기서 코딩을 시작할게. 😊`, 'luna');
                }
            } catch (e) {
                console.error('Failed to open folder picker', e);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
